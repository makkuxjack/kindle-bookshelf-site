<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle 本棚</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --text: #2b2b2b;
    --text-sub: #777;
    --accent: #0f7b6c;
    --border: #e0ddd4;
    --shadow: 0 1px 4px rgba(0,0,0,.10);
    --shadow-hover: 0 4px 14px rgba(0,0,0,.18);
    --badge-bg: #0f7b6c;
    --badge-text: #fff;
    --modal-overlay: rgba(0,0,0,.5);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2a2a2d;
      --text: #e8e6e1;
      --text-sub: #9a9a9a;
      --accent: #4fb8a8;
      --border: #3a3a3e;
      --shadow: 0 1px 4px rgba(0,0,0,.4);
      --shadow-hover: 0 4px 14px rgba(0,0,0,.6);
      --modal-overlay: rgba(0,0,0,.7);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px 0;
  }
  .header-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding-bottom: 8px;
  }
  header h1 { font-size: 18px; margin: 0; white-space: nowrap; }
  #search {
    flex: 1;
    min-width: 160px;
    max-width: 420px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 14px;
  }
  #stats { font-size: 12px; color: var(--text-sub); white-space: nowrap; }
  .btn, select.btn {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #cat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-bottom: 8px;
  }
  .cat-tab {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  main { padding: 16px; max-width: 1400px; margin: 0 auto; }
  h2 { font-size: 15px; color: var(--text-sub); margin: 20px 0 10px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
    background: var(--border);
  }
  .cover-placeholder {
    width: 100%;
    aspect-ratio: 2 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    font-size: 12px;
    text-align: center;
    color: #fff;
    background: linear-gradient(140deg, #4a6572, #232e33);
    word-break: break-word;
  }
  .card-label {
    padding: 6px 8px;
    font-size: 12px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-sub {
    padding: 0 8px 8px;
    font-size: 11px;
    color: var(--text-sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .count-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 999px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .sample-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #b3541e;
    color: #fff;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  #modal, #pass-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--modal-overlay);
    overflow-y: auto;
    padding: 24px 16px;
    overscroll-behavior: contain; /* iPad: モーダル端で背後の一覧へスクロールが連鎖するのを防ぐ */
  }
  #modal.open, #pass-overlay.open { display: block; }
  body.modal-open { overflow: hidden; }
  #modal-inner {
    background: var(--bg);
    border-radius: 14px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
  }
  #modal-title { font-size: 17px; margin: 0 42px 4px 0; }
  #modal-sub {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #modal-cat { font-size: 12px; padding: 3px 6px; }
  #modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  #pass-form {
    background: var(--bg);
    border-radius: 14px;
    max-width: 380px;
    margin: 15vh auto 0;
    padding: 24px;
    text-align: center;
  }
  #pass-form h3 { margin: 0 0 14px; font-size: 16px; }
  #pass-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 12px;
  }
  #pass-error { color: #c0392b; font-size: 12px; margin-top: 10px; min-height: 1em; }
  .edit-input, .edit-select {
    width: 100%;
    padding: 4px 6px;
    margin: 0 0 6px;
    font-size: 11px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--card);
    color: var(--text);
  }
  /* 巻の並び替え（シリーズ一覧の編集モード） */
  .order-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }
  .order-btn {
    flex: 0 0 auto;
    width: 34px;
    height: 34px; /* iPad で指の腹でも押せる大きさを確保する */
    padding: 0;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--card);
    color: var(--accent);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
  }
  .order-btn:disabled { opacity: .3; cursor: default; }
  .order-num {
    flex: 1 1 auto;
    min-width: 0;
    height: 34px;
    padding: 2px 4px;
    text-align: center;
    /* iPad は入力欄の文字が16px未満だと、触れた瞬間に画面を勝手に拡大する。それを避けるため16px */
    font-size: 16px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--card);
    color: var(--text);
  }
  .order-of { flex: 0 0 auto; font-size: 10px; color: var(--text-sub); }
  .order-reset { font-size: 11px; padding: 3px 8px; }
  /* 編集モードのカテゴリ管理ボタン。ふつうのタブと見分けがつくように破線にする */
  .cat-admin { border-style: dashed; }
  .cat-danger { color: #c0392b; border-color: #c0392b; }
  /* カテゴリの追加・改名・削除はページの中で入力する。
     ブラウザの入力ダイアログ(prompt)は「ホーム画面に追加」した iPad で出ないことがあるため使わない。 */
  #cat-edit-panel {
    display: none;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 8px;
  }
  .cat-panel-msg { font-size: 13px; }
  .cat-panel-input {
    flex: 1 1 180px;
    min-width: 0;
    height: 38px;
    padding: 4px 10px;
    font-size: 16px; /* 16px未満だと iPad が入力時に勝手に拡大する */
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
  }
  .cat-panel-btn {
    flex: 0 0 auto;
    height: 38px;
    padding: 0 14px;
    font-size: 13px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--card);
    color: var(--accent);
    cursor: pointer;
  }
  .cat-panel-btn.primary { background: var(--accent); color: #fff; }
  .cat-panel-btn.danger { color: #c0392b; border-color: #c0392b; }
  .cat-panel-err { flex-basis: 100%; font-size: 12px; color: #c0392b; }
  #empty-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
    line-height: 2;
  }
  #edit-hint {
    display: none;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  body.editing #edit-hint { display: block; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>📚 Kindle 本棚</h1>
    <input id="search" type="search" placeholder="シリーズ名・タイトル・著者で検索">
    <span id="stats"></span>
    <select id="sort-select" class="btn" title="シリーズの並び順">
      <option value="recency" title="この端末で本を開いた履歴が新しい順（履歴が無いうちは50音順と同じ並び）">最近読んだ順</option>
      <option value="name">50音順</option>
    </select>
    <button class="btn" id="edit-toggle">シリーズ編集</button>
    <button class="btn" id="export-overrides" title="手動修正を overrides.js として保存（リポジトリに置くと他デバイスにも反映）">修正を書き出す</button>
  </div>
  <div id="cat-tabs"></div>
  <div id="cat-edit-panel"></div>
</header>
<main>
  <div id="edit-hint">編集モード: 各巻の入力欄にシリーズ名を、セレクトにカテゴリを指定できます（空欄/「自動」に戻すと自動判定に戻る）。シリーズの表紙を開くと、各巻に ▲▼ と番号欄が出て読む順に並べ替えられます（巻数表記が無いシリーズや、複数をまとめたシリーズ向け）。カテゴリはタブ右端の「＋ カテゴリを作る」で自分の分類を追加できます。修正はこのブラウザに保存されます。「修正を書き出す」で overrides.js を保存し、リポジトリに置くと他のデバイスにも反映されます。</div>
  <div id="content"></div>
</main>

<div id="modal">
  <div id="modal-inner">
    <button id="modal-close" title="閉じる (Esc)">✕</button>
    <h3 id="modal-title"></h3>
    <div id="modal-sub">
      <span id="modal-info"></span>
      <label>カテゴリ: <select id="modal-cat"></select></label>
      <span id="modal-order-reset"></span>
    </div>
    <div class="grid" id="modal-grid"></div>
  </div>
</div>

<div id="pass-overlay">
  <form id="pass-form">
    <h3>🔒 パスフレーズを入力</h3>
    <input type="password" id="pass-input" autocomplete="current-password" placeholder="パスフレーズ">
    <button class="btn" type="submit">開く</button>
    <div id="pass-error"></div>
    <div id="pass-hint" style="font-size:11px;color:var(--text-sub);margin-top:8px;"></div>
  </form>
</div>

<datalist id="series-names"></datalist>

<script>
'use strict';

/* ---------- データ読み込み（file:// でも動くよう script タグで） ---------- */
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve(true);
    s.onerror = () => { s.remove(); reject(new Error(src)); };
    document.head.appendChild(s);
  });
}

const OVERRIDES_KEY = 'kindle-bookshelf-overrides';
const PASS_KEY = 'kindle-bookshelf-pass';
const SORT_KEY = 'kindle-bookshelf-sort';
const CAT_KEY = 'kindle-bookshelf-cat';
const RECENT_KEY = 'kindle-bookshelf-recent';

// overrides の中身:
//   series     {asin: シリーズ名}          この本をこのシリーズに入れる
//   category   {シリーズ名: カテゴリid}     このシリーズをこのカテゴリに入れる
//   order      {シリーズ名: [asin,...]}    このシリーズの巻をこの順に並べる
//   categories {カテゴリid: 表示名}         ユーザーが自分で足したカテゴリ
// 4つとも「キー→値」のマップに揃えてある。categories だけリストにすると差分方式（下記）に乗らないため。
const OV_SECTIONS = ['series', 'category', 'order', 'categories'];
function emptyOverrides() {
  return { series: {}, category: {}, order: {}, categories: {} };
}

// 値が等しいかの判定。order は配列なので同じ中身でも別物として作られる（=== では常に不一致になる）。
// ここを === のままにすると「overrides.js に書き出し済みなのに未書き出し扱いが消えない」が起きる。
function sameOverrideValue(a, b) {
  if (a === b) return true;
  if (a == null || b == null) return false;
  if (typeof a !== 'object' && typeof b !== 'object') return false;
  return JSON.stringify(a) === JSON.stringify(b);
}

// 旧形式（フラットな asin→シリーズ名）も、categories が無い旧 overrides.js も読めるように正規化する
function normalizeOverrides(raw) {
  if (!raw || typeof raw !== 'object') return emptyOverrides();
  if (raw.series || raw.category || raw.order || raw.categories) {
    const out = emptyOverrides();
    for (const sec of OV_SECTIONS) Object.assign(out[sec], raw[sec] || {});
    return out;
  }
  return Object.assign(emptyOverrides(), { series: Object.assign({}, raw) });
}

// localStorage には overrides.js（ファイル）との「差分」だけを保存する。
// 値が null のエントリは「ファイル側の指定を打ち消して自動判定に戻す」マーカー。
// マージ済み全体を保存するとファイル側の後日の更新が反映されなくなるため、この形を崩さないこと。
function loadLocalOverrides() {
  try { return normalizeOverrides(JSON.parse(localStorage.getItem(OVERRIDES_KEY) || '{}')); }
  catch (e) { return emptyOverrides(); }
}
function saveLocalOverrides(ov) {
  localStorage.setItem(OVERRIDES_KEY, JSON.stringify(ov));
}

/* ---------- 閲覧ログ（「最近読んだ」タブ用） ----------
   Amazon の recencyRank（取得データに無い/信頼できない）に依存せず、このブラウザで実際に
   開いた本を記録する。{asin, ts} を新しい順で最大 RECENT_MAX 件のリングバッファに保持し、
   同じ本を再度開いたら重複を除いて先頭へ。表示側は asin から現在の所属グループを引く（改名・再編に強い）。*/
const RECENT_MAX = 100;
function loadRecent() {
  try {
    const a = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    return Array.isArray(a) ? a.filter(e => e && e.asin) : [];
  } catch (e) { return []; }
}
function pushRecent(asin, now) {
  if (!asin) return;
  const ts = now || Date.now();
  const list = loadRecent().filter(e => e.asin !== asin);
  list.unshift({ asin, ts });
  if (list.length > RECENT_MAX) list.length = RECENT_MAX;
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch (e) { /* 容量超過等は無視 */ }
}

/* ---------- タイトル正規化・シリーズ推定 ---------- */
function normalizeTitle(t) {
  return String(t || '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/　/g, ' ')
    .trim();
}

const PART_MAP = { '上': 1, '前': 1, '前編': 1, '中': 2, '下': 3, '後': 3, '後編': 3 };

function isVolumeParen(inner) {
  inner = inner.trim();
  // 「1巻」のような "数字＋巻" も巻数とみなす（飾り除去で (1巻) を残し、後段で巻数として拾えるように）
  return /^\d+(?:\.\d+)?巻?$/.test(inner) || PART_MAP.hasOwnProperty(inner);
}

function romanToInt(s) {
  const vals = { I: 1, V: 5, X: 10 };
  let n = 0;
  for (let i = 0; i < s.length; i++) {
    const v = vals[s[i]], next = vals[s[i + 1]] || 0;
    n += v < next ? -v : v;
  }
  return n;
}

// タイトルから { seriesName, volume } を推定する
function extractSeries(rawTitle) {
  let t = normalizeTitle(rawTitle);

  // 末尾の飾り（レーベル括弧・【電子特典付き】・<シリーズ名> 等）を繰り返し除去。
  // ただし巻数を表すもの（数字・上中下）は残す
  let prev;
  do {
    prev = t;
    const m = t.match(/[（(]([^（()）]*)[)）]\s*$/);
    if (m && !isVolumeParen(m[1])) t = t.slice(0, m.index).trim();
    const m2 = t.match(/【([^【】]*)】\s*$/);
    if (m2 && !isVolumeParen(m2[1])) t = t.slice(0, m2.index).trim();
    const m3 = t.match(/[<＜]([^<>＜＞]*)[>＞]\s*$/);
    if (m3) t = t.slice(0, m3.index).trim();
  } while (t !== prev && t.length > 0);

  // 中間の【短編】【通常版】【電子特典付き】等も除去（先頭の【フルカラー】等と巻数【N】は残す）
  t = t.replace(/(.)【([^【】]*)】/g, (m, pre, inner) => isVolumeParen(inner) ? m : pre + ' ')
       .replace(/\s+/g, ' ').trim();

  // シリーズ名がタイトル内に明示/反復されている特殊形式は、巻数推定より先に確定する。
  //   (a)「…『シリーズ名』シリーズ」= シリーズ名が明記されている。
  //       例: 青春ブタ野郎はおでかけシスターの夢を見ない 『青春ブタ野郎』シリーズ → 「青春ブタ野郎」
  //       毎巻サブタイトルが変わり巻数も無いため、この明示名が無いと1冊ずつバラバラになる。
  const seriesMark = t.match(/『([^『』]+)』\s*シリーズ/);
  if (seriesMark) return { seriesName: seriesMark[1], volume: null };
  //   (b)「シリーズ名N！ シリーズ名！」= 巻数付きの語のあとにシリーズ名本体が繰り返される。
  //       例: とらドラ2！ とらドラ！ → シリーズ名「とらドラ！」・巻2（後半がシリーズ名本体）。
  //       後半が前半の接頭辞で始まる場合のみ採用し、無関係な「○○3！ △△！」の誤結合を避ける。
  const echoM = t.match(/^(.+?)(\d+)[！!]\s+(.+?[！!])$/);
  if (echoM && echoM[3].startsWith(echoM[1])) return { seriesName: echoM[3], volume: parseFloat(echoM[2]) };

  // 巻数の抽出: まず末尾パターン（優先順）。数字は 10.5 のような小数巻（番外編）も拾う。
  // lookbehind ((?<=…)) はリテラルで書くと非対応ブラウザでスクリプト全体がパースエラーになるため、
  // 必ず new RegExp + safeRe 経由（非対応環境ではそのパターンだけ無効化される）
  let volume = null;
  const NUM = '(\\d+(?:\\.\\d+)?)';
  const NEVER_MATCH = /$^/;
  const safeRe = (src) => { try { return new RegExp(src); } catch (e) { return NEVER_MATCH; } };
  const tailPatterns = [
    { re: new RegExp('[（(]\\s*' + NUM + '\\s*[)）]\\s*$'), num: m => parseFloat(m[1]) },      // （３２）
    { re: new RegExp('[（(]\\s*' + NUM + '\\s*巻\\s*[)）]\\s*$'), num: m => parseFloat(m[1]) }, // (1巻) 琴浦さん型
    { re: new RegExp('【\\s*' + NUM + '\\s*】\\s*$'), num: m => parseFloat(m[1]) },            // 【３２】
    { re: /[（(]\s*(上|中|下|前|後|前編|後編)\s*[)）]\s*$/, num: m => PART_MAP[m[1]] },        // (上)
    { re: new RegExp('第\\s*' + NUM + '\\s*[巻話集]\\s*$'), num: m => parseFloat(m[1]) },      // 第3巻
    { re: new RegExp('\\s' + NUM + '\\s*巻\\s*$'), num: m => parseFloat(m[1]) },               // ○○ 3巻
    { re: new RegExp('[Vv][Oo][Ll]\\.?\\s*' + NUM + '\\s*$'), num: m => parseFloat(m[1]) },    // vol.2
    { re: new RegExp('[#＃]\\s*' + NUM + '\\s*$'), num: m => parseFloat(m[1]) },               // #3
    { re: safeRe('(?<=[^\\x00-\\x7F])\\s*([IVX]{1,7})\\s*$'), num: m => romanToInt(m[1]) },    // ○○VI（ローマ数字巻）
    { re: new RegExp('(?:\\s|[：:])' + NUM + '\\s*[.。]?\\s*$'), num: m => parseFloat(m[1]) }, // ○○ 3
    { re: new RegExp(NUM + '\\s*[.。]?\\s*$'), num: m => parseFloat(m[1]) },                   // ○○3 / ○○10.5
  ];
  for (const p of tailPatterns) {
    const m = t.match(p.re);
    if (m) {
      const rest = t.slice(0, m.index).trim().replace(/[‐‑–—―\-～〜:：]+$/, '').trim();
      if (rest.length > 0) {           // シリーズ名が空になる場合は巻数とみなさない
        volume = p.num(m);
        t = rest;
      }
      break;
    }
  }

  // 末尾で見つからなければタイトル中間の強いマーカーを探す
  // （「○○ #16 サブタイトル」「○○(1) サブタイトル」「○○ 10巻 番外編」等。
  //   以降のサブタイトルは捨ててシリーズ名だけ残す。素の数字は誤爆しやすいので拾わない）
  if (volume === null) {
    const midPatterns = [
      new RegExp('level\\.?\\s*' + NUM, 'i'),   // 灰と幻想のグリムガル level.1 サブタイトル
      new RegExp('Flag\\s*' + NUM, 'i'),        // 男女の友情は成立する？（…） Flag 1. サブタイトル
      new RegExp('\\s(\\d+)\\.(?=[^0-9．。])'),  // 対魔導学園35試験小隊 10.魔女狩り戦争（数字.の後がサブタイトル。10.5等の小数は除外）
      new RegExp('\\s*[#＃]\\s*' + NUM + '(?=\\s|$)'),
      new RegExp('\\s*[（(]\\s*' + NUM + '\\s*[)）]'),
      new RegExp('\\s*【\\s*' + NUM + '\\s*】'),
      new RegExp('\\s*第\\s*' + NUM + '\\s*[巻話集]'),
      new RegExp('\\s+' + NUM + '\\s*巻'),
      // ラノベ定番の「タイトルN サブタイトル」直結形式（例: ソードアート・オンライン1 アインクラッド）。
      // 誤爆を避けるため数字の直前は非ASCII、直後にスペース+続きがある場合のみ
      safeRe('(?<=[^\\x00-\\x7F])' + NUM + '(?=\\s+\\S)'),
      // スペース区切りの中間数字（例: ○○ですよ？ 4 ○○ですよ？）。数字単独でサブタイトルが続く場合のみ
      new RegExp('\\s' + NUM + '(?=\\s+\\S)'),
    ];
    for (const re of midPatterns) {
      const m = t.match(re);
      if (m) {
        const rest = t.slice(0, m.index).trim().replace(/[‐‑–—―\-～〜:：]+$/, '').trim();
        if (rest.length > 0) {
          volume = parseFloat(m[1]);
          t = rest;
        }
        break;
      }
    }
  }

  // ここまでで巻数が取れなければ、山括弧の上中下を保険で拾う（例: タイム・リープ＜下＞ あしたはきのう）。
  // 「Flag 4. …〈上〉」のように別の巻マーカーを併記する本があるため、山括弧はあえて最後に評価する。
  if (volume === null) {
    const bp = t.match(/[＜〈<]\s*(前編|後編|上|中|下|前|後)\s*[＞〉>]/);
    if (bp) {
      const rest = (t.slice(0, bp.index) + ' ' + t.slice(bp.index + bp[0].length)).replace(/\s+/g, ' ').trim();
      if (rest.length > 0) { volume = PART_MAP[bp[1]]; t = rest; }
    }
  }

  return { seriesName: t || normalizeTitle(rawTitle), volume };
}

function formatAuthors(a) {
  const list = Array.isArray(a) ? a : (a ? [a] : []);
  return list.map(x => String(x).replace(/[:：]\s*$/, '').trim()).filter(Boolean).join('、');
}

function readerUrl(book) {
  if (book.webReaderUrl && /^https?:\/\//.test(book.webReaderUrl)) return book.webReaderUrl;
  const origin = (window.KINDLE_BOOKS && window.KINDLE_BOOKS.origin) || 'https://read.amazon.co.jp';
  return origin + '/kindle-library/manga-wr/' + encodeURIComponent(book.asin);
}

/* ---------- カテゴリ判定 ---------- */
const CATEGORIES = [
  { id: 'comic', label: '漫画' },
  { id: 'adult', label: '成人向け' },
  { id: 'lightnovel', label: 'ラノベ' },
  { id: 'litefiction', label: 'ライト文芸' },
  { id: 'bungei', label: '文芸' },
  { id: 'jitsuyo', label: '実用書・その他' },
  { id: 'aozora', label: '青空文庫' },
];
const CAT_LABEL = Object.fromEntries(CATEGORIES.map(c => [c.id, c.label]));

/* ---------- ユーザーが足したカテゴリ ----------
   上の CATEGORIES（自動判定が使う固定7件）の配列そのものは docs/measure.js が名前で切り出して
   数えているため、形を変えずに残す。足したカテゴリは overrides.categories に持ち、表示のときだけ合成する。*/
function allCategories() {
  const extra = [];
  for (const [id, label] of Object.entries((OVERRIDES && OVERRIDES.categories) || {})) {
    if (label && !RESERVED_CAT_IDS.has(id)) extra.push({ id, label: String(label) });
  }
  return CATEGORIES.concat(extra);
}
function catLabel(id) {
  const found = allCategories().find(c => c.id === id);
  return found ? found.label : (CAT_LABEL[id] || id);
}
function isUserCategory(id) {
  return typeof id === 'string' && id.indexOf('user:') === 0;
}
// 固定カテゴリのid・タブの「すべて」・プロトタイプ汚染の元になるキーは使わせない
const RESERVED_CAT_IDS = new Set(
  ['all', '__proto__', 'constructor', 'prototype'].concat(CATEGORIES.map(c => c.id))
);
// 表示名から重複しないIDを作る。表示名は後から変えられるので、IDは作った時点のもので固定する。
function newCategoryId(label) {
  const slug = String(label).trim().replace(/\s+/g, '-').slice(0, 24) || 'cat';
  let id = 'user:' + slug;
  let n = 2;
  while (RESERVED_CAT_IDS.has(id) || ((OVERRIDES.categories || {})[id] != null)) {
    id = 'user:' + slug + '-' + (n++);
  }
  return id;
}

// レーベル名の表記ゆれ（全角/半角・スペース・中黒・記号の有無）を吸収してから比較するための正規化。
// これで「アース・スター ノベル」も「アース・スターノベル」も、「PASH! ブックス」も「PASH!ブックス」も
// 同じ形になり、括弧内のレーベル名を取りこぼしにくくなる。
function normLabel(s) {
  return String(s || '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/！/g, '!').replace(/／/g, '/').replace(/？/g, '?')
    .replace(/[\s　・･★☆]/g, '')
    .toUpperCase();
}

// ラノベのレーベル名。正規化(normLabel)して部分一致で判定するので、全角半角・スペースのゆれは自動吸収。

  'ツギクルブックス', 'Mノベルス',
  // 追加分（レーベル辞書の漏れ）
  'GCノベルズ', 'C★NOVELS', 'HJ NOVELS', 'ブレイブ文庫', '一二三文庫',
  'レジーナブックス', '一迅社ブックスDF', '角川フォレスタ',
].map(normLabel);

// ライト文芸のレーベル名。ラノベと一般文芸の中間（メディアワークス文庫・新潮文庫nex 等）。
// ラノベ判定より先に評価して『ライト文芸』カテゴリへ振り分ける（要望D）。
const LITE_LABELS = [
  'メディアワークス文庫', '新潮文庫nex', 'スターツ出版文庫', 'ベリーズ文庫', 'LINE文庫',
  '富士見L文庫', 'ことのは文庫', '集英社オレンジ文庫', 'ポプラ文庫ピュアフル', 'メゾン文庫',
  'マイナビ出版ファン文庫', 'ノベマ', 'キャラ文芸',
].map(normLabel);

// 成人向けのレーベル名。**明確に成人向け専門のレーベルだけ**に絞る。
// 「写真集」「グラビア」などの汎用語は入れない（一般作品まで巻き込むため）。
const ADULT_LABELS = [
  '美少女文庫', 'フランス書院', 'オトナ文庫', '二次元ドリーム', 'ワニマガジン',
  'キルタイムコミュニケーション', 'ぷちぱら文庫', 'GOTコミックス', 'MAXING',
].map(normLabel);

// タイトル等に「18禁」等が明記されている場合の判定（レーベル名が無い本の保険）
const ADULT_RE = /成人向け|１８禁|18禁|Ｒ－?１８|R-?18(?![0-9])|アダルト/i;

function hasLabel(normText, labels) {
  return labels.some(l => l && normText.includes(l));
}

// 1冊ぶんの自動カテゴリ判定。
// webReaderUrl の /manga-wr/（Amazonがコミックビューアを割り当てた本）が最も信頼できる漫画シグナル。
// レーベル名の判定は normLabel で表記ゆれを吸収してから行う。
function detectCategory(book) {
  const title = String(book.title || '');
  const pub = String(book.publisher || (book.publishers && book.publishers[0]) || '');
  const norm = normLabel(title + ' ' + pub);
  if (/青空文庫/.test(pub) || /青空文庫/.test(title)) return 'aozora';
  if (ADULT_RE.test(title) || ADULT_RE.test(pub) || hasLabel(norm, ADULT_LABELS)) return 'adult';
  if (/\/manga-wr\//.test(String(book.webReaderUrl || ''))) return 'comic';
  if (hasLabel(norm, LITE_LABELS)) return 'litefiction';
  if (hasLabel(norm, LN_LABELS)) return 'lightnovel';
  if (/新書/.test(title)) return 'jitsuyo';
  if (/文庫/.test(title)) return 'bungei';
  return 'jitsuyo';
}

/* ---------- グルーピング ---------- */
// validCats は「今ある全カテゴリのid」。渡さない呼び出し（docs/measure.js）では従来どおり素通しする。
function groupBooks(items, overrides, seriesOrder, validCats) {
  const groups = new Map(); // key -> { key, name, books: [{book, volume}] }

  // series-order.js（Webで調べた正式刊行順）は「巻順」だけでなく「シリーズへの所属」も解決する。
  // 青ブタ型（巻数がなくタイトルも毎巻違うシリーズ）はタイトル推定では同じシリーズに集まらないため
  const orderLookup = new Map(); // asin -> シリーズ名
  for (const [name, asins] of Object.entries(seriesOrder || {})) {
    if (Array.isArray(asins)) for (const asin of asins) orderLookup.set(asin, name);
  }

  for (const book of items) {
    const ex = extractSeries(book.title);
    const manual = overrides.series[book.asin];
    const fromOrder = orderLookup.get(book.asin);
    // 同名でも「漫画版」と「文字版(ラノベ/文芸)」は別シリーズとして扱う。
    // 例:「声優ラジオのウラオモテ」は電撃文庫版とコミカライズ版があり、まとめると多数決で
    //    冊数の多い方(ラノベ)に飲まれて他方がそのタブから消える。Amazonが漫画に割り当てる
    //    /manga-wr/ を媒体シグナルにして分ける。ただし手動まとめ(overrides)・seriesAsin・
    //    刊行順(series-order)で所属が明示されているものは、その意図を尊重して分けない。
    const isComic = /\/manga-wr\//.test(String(book.webReaderUrl || ''));
    let key, name, media = 'x';
    if (manual) {
      key = 'ov:' + manual;
      name = manual;
    } else if (fromOrder) {
      key = 'so:' + fromOrder;
      name = fromOrder;
    } else if (book.seriesAsin) {
      key = 'sa:' + book.seriesAsin;
      name = null; // 後でメンバーから決める
    } else {
      media = isComic ? 'c' : 'b';
      key = 'tt:' + ex.seriesName + '|' + media;
      name = ex.seriesName;
    }
    const volume = (book.seriesNumber != null && book.seriesNumber !== '')
      ? Number(book.seriesNumber) : ex.volume;

    if (!groups.has(key)) groups.set(key, { key, name, media, books: [] });
    groups.get(key).books.push({ book, volume, guessedName: ex.seriesName });
  }

  // seriesAsin グループの表示名 = メンバーの推定シリーズ名の最頻値
  for (const g of groups.values()) {
    if (g.name == null) {
      const freq = new Map();
      for (const b of g.books) freq.set(b.guessedName, (freq.get(b.guessedName) || 0) + 1);
      let best = '', bestN = -1;
      for (const [n, c] of freq) if (c > bestN) { best = n; bestN = c; }
      g.name = best;
    }
  }

  // 同名グループを統合（一部の巻だけ seriesAsin が欠けている場合や、
  // 手動修正で既存シリーズ名を指定した場合の分裂対策）。2段階で行う:
  //  pass1: 自動判定(tt:)グループを media(漫画'c'/文字'b')ごとに確定。
  //         同名でも媒体が違えば別シリーズのまま（声優ラジオのコミック版/ラノベ版）。
  //  pass2: 所属を明示したグループ(手動まとめ ov: / 刊行順 so: / seriesAsin sa: = media 'x')を、
  //         媒体を問わず同名の実媒体グループへ吸収する。これをしないと「1巻だけ手動登録」した本が
  //         自動グループ(media 'b')と統合キーが食い違い、別カードに割れる（＝同名シリーズが2つ問題）。
  //         同名の実媒体グループが無ければ x のまま単独で残す（series-order で束ねた青ブタ等）。
  const byName = new Map();
  for (const g of groups.values()) {
    if (g.media === 'x') continue;
    const nk = g.name + '\0' + g.media;
    const existing = byName.get(nk);
    if (existing) existing.books.push(...g.books);
    else byName.set(nk, g);
  }
  for (const g of groups.values()) {
    if (g.media !== 'x') continue;
    const sameName = [...byName.values()].filter(x => x.name === g.name);
    if (sameName.length) {
      sameName.sort((a, b) => b.books.length - a.books.length); // 冊数が最大の同名グループへ寄せる
      sameName[0].books.push(...g.books);
    } else {
      const nk = g.name + '\0x';
      const existing = byName.get(nk);
      if (existing) existing.books.push(...g.books);
      else byName.set(nk, g);
    }
  }

  const result = [...byName.values()];
  for (const g of result) {
    // 巻の並び: 明示的な刊行順 (overrides.order / series-order.js) > 巻番号 > 購入が古い順 > タイトル順
    // 空配列は「指定なし」として扱う。空配列を有効な指定と見なすと、
    // series-order.js に書いてある正式な刊行順まで打ち消してしまう。
    let orderArr = overrides.order[g.name];
    if (!orderArr || !orderArr.length) orderArr = (seriesOrder || {})[g.name];
    const orderIdx = orderArr ? new Map(orderArr.map((asin, i) => [asin, i])) : null;
    g.books.sort((a, b) => {
      if (orderIdx) {
        const oa = orderIdx.has(a.book.asin) ? orderIdx.get(a.book.asin) : Infinity;
        const ob = orderIdx.has(b.book.asin) ? orderIdx.get(b.book.asin) : Infinity;
        if (oa !== ob) return oa - ob;
      }
      // 巻数で並べる。無印(volume=null)は「1作目」とみなして先頭へ（番外編は 5.5 等の数字で正しい位置に入る）。
      // series-order.js で明示された刊行順があれば上の orderIdx が優先するので、ここは無い場合の近似。
      const va = a.volume == null ? -Infinity : a.volume;
      const vb = b.volume == null ? -Infinity : b.volume;
      if (va !== vb) return va - vb;
      // acquisitionRank は 0 が最新購入。巻数不明どうしは「購入が古い順」（≒読み始めた順）に並べる
      const ra = a.book.acquisitionRank, rb = b.book.acquisitionRank;
      if (ra != null && rb != null && ra !== rb) return rb - ra;
      return normalizeTitle(a.book.title).localeCompare(normalizeTitle(b.book.title), 'ja');
    });

    // カテゴリ: メンバーの多数決 → 手動指定があればそちら
    const freq = new Map();
    for (const { book } of g.books) {
      const c = detectCategory(book);
      freq.set(c, (freq.get(c) || 0) + 1);
    }
    let best = 'jitsuyo', bestN = -1;
    for (const [c, n] of freq) if (n > bestN) { best = c; bestN = n; }
    g.autoCategory = best;
    // 消したカテゴリへの割り当てが残っていることがある（別の端末で消した場合など）。
    // 実在しないカテゴリidをそのまま採用すると、そのシリーズはどのタブにも出てこない迷子になるので、
    // 実在しないときは自動判定に落とす。
    const wantCat = overrides.category[g.name];
    g.category = (wantCat && (!validCats || validCats.has(wantCat))) ? wantCat : best;

    // 最近読んだ度（グループ内で最も最近の recencyRank。0が最も最近）
    let rec = Infinity;
    for (const { book } of g.books) {
      if (book.recencyRank != null && book.recencyRank < rec) rec = book.recencyRank;
    }
    g.recency = rec;

    // 検索用テキストを事前計算（毎キー入力での正規化をなくし、iPad の入力カクつきを防ぐ）
    g.searchText = normalizeTitle(
      g.name + '\n' + g.books.map(({ book }) => book.title + '\n' + formatAuthors(book.authors)).join('\n')
    ).toLowerCase();
  }

  result.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  return result;
}

/* ---------- 復号（GitHub Pages 用の暗号化データ） ---------- */
function b64ToBytes(s) {
  return Uint8Array.from(atob(s), c => c.charCodeAt(0));
}
async function decryptPayload(enc, pass) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64ToBytes(enc.salt), iterations: 310000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(enc.iv) }, key, b64ToBytes(enc.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
function askPassphrase() {
  return new Promise((resolve) => {
    const overlay = document.getElementById('pass-overlay');
    const form = document.getElementById('pass-form');
    const input = document.getElementById('pass-input');
    const errEl = document.getElementById('pass-error');
    const hintEl = document.getElementById('pass-hint');
    const showHint = () => {
      const dt = window.KINDLE_ENC.encryptedAt ? new Date(window.KINDLE_ENC.encryptedAt) : null;
      hintEl.textContent = (dt && !isNaN(dt))
        ? `データ更新: ${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2, '0')}`
        : '';
    };
    showHint();
    overlay.classList.add('open');
    input.focus();
    let refreshedCache = false;
    form.onsubmit = async (e) => {
      e.preventDefault();
      const pass = input.value.trim(); // iPad の自動スペース等の混入対策
      if (!pass) return;
      errEl.textContent = '復号中…';
      try {
        const obj = await decryptPayload(window.KINDLE_ENC, pass);
        localStorage.setItem(PASS_KEY, pass);
        overlay.classList.remove('open');
        resolve(obj);
        return;
      } catch (err) { /* fallthrough */ }
      // パスフレーズ変更直後は古い data.enc.js がブラウザ/CDN キャッシュに残っていることがある。
      // 一度だけキャッシュを回避して最新を取り直し、同じパスフレーズで再試行する
      if (!refreshedCache) {
        refreshedCache = true;
        errEl.textContent = '最新データを再取得中…';
        try {
          await loadScript('./data.enc.js?cb=' + Math.random().toString(36).slice(2));
          showHint();
          const obj = await decryptPayload(window.KINDLE_ENC, pass);
          localStorage.setItem(PASS_KEY, pass);
          overlay.classList.remove('open');
          resolve(obj);
          return;
        } catch (err2) { /* fallthrough */ }
      }
      errEl.textContent = 'パスフレーズが違います（大文字・小文字も区別されます）';
      input.select();
    };
  });
}
async function decryptFlow() {
  const saved = localStorage.getItem(PASS_KEY);
  if (saved) {
    try { return await decryptPayload(window.KINDLE_ENC, saved); }
    catch (e) {
      // 保存済みパスフレーズが正しくてもキャッシュの data.enc.js が古いと失敗する。
      // 一度だけ最新を取り直してから、保存済みパスフレーズを諦める
      try {
        await loadScript('./data.enc.js?cb=' + Math.random().toString(36).slice(2));
        return await decryptPayload(window.KINDLE_ENC, saved);
      } catch (e2) { localStorage.removeItem(PASS_KEY); }
    }
  }
  return askPassphrase();
}

/* ---------- 描画 ---------- */
let ALL_ITEMS = [];
let FILE_OV = emptyOverrides();  // overrides.js 由来（このセッション中は読み取り専用）
let LOCAL_OV = emptyOverrides(); // localStorage の差分（null = ファイル値の打ち消し）
let OVERRIDES = emptyOverrides();
let SERIES_ORDER = {}; // series-order.js 由来（Webで調べた正式刊行順）
let GROUPS = [];
let EDITING = false;
let CURRENT_GROUP_NAME = null;
// 同じ名前のグループ（漫画版/文字版）があるため、開いているモーダルを名前だけでは特定できない。
// key を第一候補、代表の本の asin を保険として持つ（key は編集操作で変わることがある）。
let CURRENT_GROUP_KEY = null;
let CURRENT_GROUP_ASIN = null;
let SORT_MODE = localStorage.getItem(SORT_KEY) || 'recency';
let CURRENT_CAT = localStorage.getItem(CAT_KEY) || 'all';
// カテゴリの追加・改名・削除は、ブラウザの入力ダイアログ(prompt/confirm)ではなくページ内で行う。
// ホーム画面に追加した iPad ではダイアログが出ないことがあり、操作できなくなるため。
let CAT_EDIT_MODE = null;   // null / 'add' / 'rename' / 'delete'
let CAT_EDIT_ERROR = '';

function computeOverrides() {
  const out = {};
  for (const sec of OV_SECTIONS) {
    const merged = Object.assign({}, FILE_OV[sec]);
    for (const [k, v] of Object.entries(LOCAL_OV[sec])) {
      if (v === null) delete merged[k];
      else merged[k] = v;
    }
    out[sec] = merged;
  }
  return out;
}

// 差分方式でローカル修正を記録する（value が空文字・空配列なら「自動判定に戻す」）
function applyLocalOverride(section, key, value) {
  const fileVal = FILE_OV[section][key];
  const hasValue = Array.isArray(value) ? value.length > 0 : !!value;
  if (hasValue) {
    if (sameOverrideValue(fileVal, value)) delete LOCAL_OV[section][key];
    else LOCAL_OV[section][key] = value;
  } else {
    if (fileVal != null) LOCAL_OV[section][key] = null;
    else delete LOCAL_OV[section][key];
  }
  saveLocalOverrides(LOCAL_OV);
}

function coverEl(book) {
  if (book.productUrl) {
    const img = document.createElement('img');
    img.className = 'cover';
    img.loading = 'lazy';
    img.alt = book.title;
    img.src = book.productUrl;
    img.onerror = () => { img.replaceWith(placeholderEl(book)); };
    return img;
  }
  return placeholderEl(book);
}
function placeholderEl(book) {
  const d = document.createElement('div');
  d.className = 'cover-placeholder';
  d.textContent = book.title;
  return d;
}

function catSelectEl(group, className) {
  const sel = document.createElement('select');
  sel.className = className || '';
  const auto = document.createElement('option');
  auto.value = '';
  auto.textContent = '自動（' + catLabel(group.autoCategory) + '）';
  sel.appendChild(auto);
  for (const c of allCategories()) {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.label;
    sel.appendChild(o);
  }
  sel.value = OVERRIDES.category[group.name] || '';
  sel.addEventListener('click', e => e.stopPropagation());
  sel.addEventListener('change', () => {
    applyLocalOverride('category', group.name, sel.value);
    rebuild(true);
  });
  return sel;
}

/* ---------- 巻の並び替え ----------
   巻数表記が無いシリーズや、複数のシリーズを手で1つにまとめたときは、自動判定では読む順にならない。
   （例: ひぐらしの8編をまとめると、各編の1巻が全部先に来てしまう）
   ここで決めた順番は overrides.order に「asin を並べた配列」として入る。読む側は groupBooks が対応済み。*/
function moveBookTo(group, asin, toIndex) {
  const own = group.books.map(b => b.book.asin);
  const from = own.indexOf(asin);
  if (from < 0) return;
  const to = Math.max(0, Math.min(own.length - 1, toIndex));
  if (to === from) return;
  own.splice(from, 1);
  own.splice(to, 0, asin);
  // 同じ名前で漫画版と文字版に分かれているシリーズ（封神演義・ヒル等）は、この保存場所を共有する。
  // 自分のグループの巻だけで丸ごと上書きすると、相手側で付けた並び順が黙って消える。
  // 並び順は「どちらが先か」しか見ないので、1つの配列に両方の巻が混ざっていても正しく動く。
  const mine = new Set(own);
  const prev = OVERRIDES.order[group.name] || SERIES_ORDER[group.name] || [];
  applyLocalOverride('order', group.name, prev.filter(a => !mine.has(a)).concat(own));
  rebuild(true);
}

function orderRowEl(group, asin) {
  const idx = group.books.findIndex(b => b.book.asin === asin);
  const total = group.books.length;
  const row = document.createElement('div');
  row.className = 'order-row';
  // カード全体が「タップで本を開く」ハンドラを持っているので、この行の操作は必ず止める
  row.addEventListener('click', e => e.stopPropagation());

  const up = document.createElement('button');
  up.className = 'order-btn';
  up.textContent = '▲';
  up.title = '1つ前へ';
  up.setAttribute('aria-label', '1つ前へ移動');
  up.disabled = idx <= 0;
  up.addEventListener('click', e => { e.stopPropagation(); moveBookTo(group, asin, idx - 1); });

  const num = document.createElement('input');
  num.className = 'order-num';
  num.type = 'number';
  num.min = '1';
  num.max = String(total);
  num.value = String(idx + 1);
  num.title = 'このシリーズの何冊目か（数字を入れるとその位置へ動きます）';
  num.setAttribute('aria-label', 'このシリーズの何冊目か');
  num.addEventListener('click', e => e.stopPropagation());
  num.addEventListener('change', e => {
    e.stopPropagation();
    const v = parseInt(num.value, 10);
    if (isNaN(v)) { num.value = String(idx + 1); return; }
    moveBookTo(group, asin, v - 1);
  });

  const of = document.createElement('span');
  of.className = 'order-of';
  of.textContent = '/ ' + total;

  const down = document.createElement('button');
  down.className = 'order-btn';
  down.textContent = '▼';
  down.title = '1つ後ろへ';
  down.setAttribute('aria-label', '1つ後ろへ移動');
  down.disabled = idx >= total - 1;
  down.addEventListener('click', e => { e.stopPropagation(); moveBookTo(group, asin, idx + 1); });

  row.append(up, num, of, down);
  return row;
}

function bookCard(entry, opts) {
  const { book, volume } = entry;
  const card = document.createElement('div');
  card.className = 'card';
  card.appendChild(coverEl(book));

  if (String(book.resourceType || '').includes('SAMPLE')) {
    const s = document.createElement('span');
    s.className = 'sample-badge';
    s.textContent = 'サンプル';
    card.appendChild(s);
  }

  const label = document.createElement('div');
  label.className = 'card-label';
  label.textContent = book.title;
  card.appendChild(label);

  const sub = document.createElement('div');
  sub.className = 'card-sub';
  sub.textContent = (volume != null ? `${volume}巻 ・ ` : '') + formatAuthors(book.authors);
  card.appendChild(sub);

  if (EDITING) {
    const input = document.createElement('input');
    input.className = 'edit-input';
    input.placeholder = 'シリーズ名を指定';
    input.value = OVERRIDES.series[book.asin] || '';
    input.setAttribute('list', 'series-names');
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('change', () => {
      const oldName = (opts && opts.group) ? opts.group.name : CURRENT_GROUP_NAME;
      applyLocalOverride('series', book.asin, input.value.trim());
      rebuild(opts && opts.keepModal);
      // シリーズ改名で旧グループが消滅したら、旧名についていた手動カテゴリ/巻順を
      // この巻の移動先グループへ引き継ぐ（黙って自動判定に戻るのを防ぐ）
      if (oldName && !GROUPS.some(g => g.name === oldName)) {
        const destGroup = GROUPS.find(g => g.books.some(b => b.book.asin === book.asin));
        const dest = destGroup ? destGroup.name : null;
        let moved = false;
        for (const sec of ['category', 'order']) {
          const v = OVERRIDES[sec][oldName];
          if (v != null && dest && OVERRIDES[sec][dest] == null) {
            applyLocalOverride(sec, dest, v);
            applyLocalOverride(sec, oldName, '');
            moved = true;
          }
        }
        if (moved) rebuild(opts && opts.keepModal);
      }
    });
    card.appendChild(input);
    if (opts && opts.group && !(opts && opts.keepModal)) {
      // 単巻カードにはカテゴリ変更セレクトも出す（シリーズはモーダル側で変更）
      card.appendChild(catSelectEl(opts.group, 'edit-select'));
    }
    // シリーズ一覧（モーダル）の中でだけ、巻の順番を動かせるようにする。
    // 1冊しかないシリーズには並べ替えるものが無いので出さない。
    if (opts && opts.group && opts.keepModal && opts.group.books.length > 1) {
      card.appendChild(orderRowEl(opts.group, book.asin));
    }
  }

  card.addEventListener('click', () => {
    // 先に開く。記録や再描画を挟むと、iPad Safari がユーザー操作起点と見なさずポップアップを止めることがある
    window.open(readerUrl(book), '_blank', 'noopener');
    pushRecent(book.asin); // 実際に開いた本を「最近読んだ」として記録する
    // 開いた直後に並びへ反映（モーダルは別要素なので開いたまま）。
    // 編集モード中は再描画しない: 入力欄ごとカードを作り直すことになり、編集作業の邪魔になる。
    // この場合も記録自体は済んでいるので、次の描画で並びに反映される。
    if (SORT_MODE === 'recency' && !EDITING) render();
  });
  return card;
}

function seriesCard(group) {
  const rep = group.books[0].book; // 並び順の先頭 = 1巻（または正式な1作目）
  const card = document.createElement('div');
  card.className = 'card';
  card.appendChild(coverEl(rep));

  if (group.books.length > 1) {
    const badge = document.createElement('span');
    badge.className = 'count-badge';
    badge.textContent = `${group.books.length}冊`;
    card.appendChild(badge);
  }

  const label = document.createElement('div');
  label.className = 'card-label';
  label.textContent = group.name;
  card.appendChild(label);

  const sub = document.createElement('div');
  sub.className = 'card-sub';
  sub.textContent = formatAuthors(rep.authors);
  card.appendChild(sub);

  card.addEventListener('click', () => openModal(group.key));
  return card;
}

function matchQuery(q, group) {
  if (!q) return true;
  return group.searchText.includes(normalizeTitle(q).toLowerCase());
}

// 「最近読んだ順」の順位づけ。主＝このブラウザの閲覧ログ（実際に開いた本）、従＝Amazon の recencyRank。
// 比較関数の中で毎回ログを引くと O(グループ数 × 冊数 × log) になるので、1グループ1回だけ先に計算しておく。
function recencyLogRank(list) {
  const byAsin = new Map();
  loadRecent().forEach((e, i) => { if (!byAsin.has(e.asin)) byAsin.set(e.asin, i); }); // 0 = 最後に開いた本
  const out = new Map();
  for (const g of list) {
    let best = Infinity; // ログに無いグループ
    for (const { book } of g.books) {
      const r = byAsin.get(book.asin);
      if (r != null && r < best) best = r;
    }
    out.set(g, best);
  }
  return out;
}

function sortGroups(list) {
  const sorted = [...list];
  if (SORT_MODE === 'recency') {
    // 閲覧ログに無いグループは同順位(Infinity)になるので、recencyRank → 名前順で決着させる。
    // Infinity 同士を引き算すると NaN になり並びが不定になるため、必ず !== で先に振り分けること。
    const log = recencyLogRank(sorted);
    sorted.sort((a, b) => {
      const la = log.get(a), lb = log.get(b);
      if (la !== lb) return la - lb;
      if (a.recency !== b.recency) return a.recency - b.recency;
      return a.name.localeCompare(b.name, 'ja');
    });
  } else {
    sorted.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  }
  return sorted;
}

// 自分で足したカテゴリを消す。そのカテゴリに入れていたシリーズは自動判定に戻す
// （戻さないと、どのタブにも出てこない迷子のシリーズができてしまう）。
function deleteUserCategory(id) {
  for (const [name, cid] of Object.entries(OVERRIDES.category)) {
    if (cid === id) applyLocalOverride('category', name, '');
  }
  applyLocalOverride('categories', id, '');
  if (CURRENT_CAT === id) {
    CURRENT_CAT = 'all';
    localStorage.setItem(CAT_KEY, CURRENT_CAT);
  }
  rebuild(false);
}

function renderTabs() {
  const bar = document.getElementById('cat-tabs');
  bar.innerHTML = '';
  const counts = new Map();
  for (const g of GROUPS) counts.set(g.category, (counts.get(g.category) || 0) + g.books.length);
  const tabs = [{ id: 'all', label: 'すべて', count: ALL_ITEMS.length }];
  for (const c of allCategories()) {
    const n = counts.get(c.id) || 0;
    // 自分で足したカテゴリは、まだ1冊も入れていなくてもタブに出す（作ったのに見えないと分からない）
    if (n > 0 || isUserCategory(c.id)) tabs.push({ id: c.id, label: c.label, count: n });
  }
  if (!tabs.some(t => t.id === CURRENT_CAT)) CURRENT_CAT = 'all';
  for (const t of tabs) {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (t.id === CURRENT_CAT ? ' active' : '');
    btn.textContent = `${t.label} (${t.count})`;
    btn.addEventListener('click', () => {
      CURRENT_CAT = t.id;
      localStorage.setItem(CAT_KEY, CURRENT_CAT);
      render();
    });
    bar.appendChild(btn);
  }

  if (!EDITING) { CAT_EDIT_MODE = null; renderCatPanel(); return; }

  // ここから下は編集モードのときだけ出るカテゴリ管理ボタン。
  // ボタンは「パネルを開く」だけで、実際の入力はページ内のパネルで行う。
  const openPanel = (mode) => { CAT_EDIT_MODE = mode; CAT_EDIT_ERROR = ''; renderCatPanel(true); };

  const add = document.createElement('button');
  add.className = 'cat-tab cat-admin';
  add.textContent = '＋ カテゴリを作る';
  add.addEventListener('click', () => openPanel('add'));
  bar.appendChild(add);

  // 選んでいるのが自分で作ったカテゴリなら、名前変更と削除も出す
  if (isUserCategory(CURRENT_CAT) && OVERRIDES.categories[CURRENT_CAT]) {
    const cur = OVERRIDES.categories[CURRENT_CAT];

    const ren = document.createElement('button');
    ren.className = 'cat-tab cat-admin';
    ren.textContent = '✎ 「' + cur + '」の名前を変える';
    ren.addEventListener('click', () => openPanel('rename'));
    bar.appendChild(ren);

    const del = document.createElement('button');
    del.className = 'cat-tab cat-admin cat-danger';
    del.textContent = '✕ 「' + cur + '」を消す';
    del.addEventListener('click', () => openPanel('delete'));
    bar.appendChild(del);
  }
  renderCatPanel();
}

// カテゴリの追加・改名・削除をページ内で完結させるパネル。
// window.prompt / confirm は「ホーム画面に追加」した iPad で出ないことがあり、
// 出なければ操作が一切できなくなるので使わない。
function renderCatPanel(focusInput) {
  const panel = document.getElementById('cat-edit-panel');
  panel.innerHTML = '';
  if (!EDITING || !CAT_EDIT_MODE) { panel.style.display = 'none'; return; }
  panel.style.display = 'flex';

  const closePanel = () => { CAT_EDIT_MODE = null; CAT_EDIT_ERROR = ''; renderCatPanel(); };
  const mkBtn = (text, cls, fn) => {
    const b = document.createElement('button');
    b.className = 'cat-panel-btn' + (cls ? ' ' + cls : '');
    b.textContent = text;
    b.addEventListener('click', fn);
    return b;
  };
  const msg = document.createElement('span');
  msg.className = 'cat-panel-msg';

  if (CAT_EDIT_MODE === 'delete') {
    const cur = OVERRIDES.categories[CURRENT_CAT] || '';
    const n = Object.values(OVERRIDES.category).filter(c => c === CURRENT_CAT).length;
    msg.textContent = '「' + cur + '」を消しますか？' +
      (n ? '（入れていた' + n + '件のシリーズは自動判定に戻ります）' : '');
    panel.appendChild(msg);
    panel.appendChild(mkBtn('消す', 'danger', () => {
      const id = CURRENT_CAT;
      CAT_EDIT_MODE = null;
      deleteUserCategory(id);
    }));
    panel.appendChild(mkBtn('やめる', '', closePanel));
    return;
  }

  const isRename = CAT_EDIT_MODE === 'rename';
  const cur = isRename ? (OVERRIDES.categories[CURRENT_CAT] || '') : '';
  msg.textContent = isRename ? '新しい名前:' : 'カテゴリ名:';
  panel.appendChild(msg);

  const input = document.createElement('input');
  input.className = 'cat-panel-input';
  input.type = 'text';
  input.placeholder = '例: 積読、お気に入り';
  input.value = cur;
  panel.appendChild(input);

  const commit = () => {
    const label = input.value.trim();
    if (!label) { CAT_EDIT_ERROR = '名前を入力してください'; renderCatPanel(true); return; }
    if (label !== cur && allCategories().some(c => c.label === label)) {
      CAT_EDIT_ERROR = '「' + label + '」は既にあります';
      renderCatPanel(true);
      return;
    }
    if (isRename) {
      if (label !== cur) applyLocalOverride('categories', CURRENT_CAT, label);
    } else {
      const id = newCategoryId(label);
      applyLocalOverride('categories', id, label);
      CURRENT_CAT = id;
      localStorage.setItem(CAT_KEY, CURRENT_CAT);
    }
    CAT_EDIT_MODE = null;
    CAT_EDIT_ERROR = '';
    rebuild(false);
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') closePanel();
  });

  panel.appendChild(mkBtn(isRename ? '変える' : '作る', 'primary', commit));
  panel.appendChild(mkBtn('やめる', '', closePanel));

  if (CAT_EDIT_ERROR) {
    const err = document.createElement('div');
    err.className = 'cat-panel-err';
    err.textContent = CAT_EDIT_ERROR;
    panel.appendChild(err);
  }
  // iPad でキーボードを出すため、パネルを開いた直後に入力欄へフォーカスする
  if (focusInput) {
    input.focus();
    if (isRename) input.select();
  }
}

function render() {
  renderTabs();
  const q = document.getElementById('search').value.trim();
  const content = document.getElementById('content');
  content.innerHTML = '';

  let visible = GROUPS.filter(g => matchQuery(q, g));
  if (CURRENT_CAT !== 'all') visible = visible.filter(g => g.category === CURRENT_CAT);
  // 単巻も含めて全作品をシリーズカード（表紙タップで一覧モーダル）で一律表示する（要望B）。
  const allGroups = sortGroups(visible);

  if (allGroups.length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    for (const g of allGroups) grid.appendChild(seriesCard(g));
    content.appendChild(grid);
  }
  if (!allGroups.length) {
    const d = document.createElement('div');
    d.id = 'empty-msg';
    d.textContent = q ? '該当する本がありません' : '';
    content.appendChild(d);
  }

  const meta = window.KINDLE_BOOKS || {};
  const dt = meta.exportedAt ? new Date(meta.exportedAt) : null;
  // 未書き出しのローカル修正件数（localStorage は消えることがあるので書き出しを促す）
  const pending = OV_SECTIONS
    .reduce((n, sec) => n + Object.keys(LOCAL_OV[sec]).length, 0);
  document.getElementById('stats').textContent =
    `${ALL_ITEMS.length}冊 / ${GROUPS.length}グループ` +
    (dt && !isNaN(dt) ? ` ・ 取得: ${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()}` : '') +
    (pending ? ` ・ 未書き出しの修正: ${pending}件` : '');
}

function openModal(key) {
  const group = GROUPS.find(g => g.key === key);
  if (!group) return;
  // key は編集操作で変わり得る（同名グループ統合の先勝ちで ov:/sa:/tt: が入れ替わる）ため
  // rebuild 後の追跡は名前で行う
  CURRENT_GROUP_NAME = group.name;
  CURRENT_GROUP_KEY = group.key;
  CURRENT_GROUP_ASIN = group.books[0].book.asin;
  document.getElementById('modal-title').textContent = group.name;
  document.getElementById('modal-info').textContent =
    `${group.books.length}冊 ・ ${formatAuthors(group.books[0].book.authors)}`;
  const catWrap = document.getElementById('modal-cat');
  const newSel = catSelectEl(group);
  newSel.id = 'modal-cat';
  catWrap.replaceWith(newSel);
  // 「自動に戻す」は、このシリーズの巻が実際に並べ替えられているときだけ出す。
  // 同じ名前の別グループ（漫画版/文字版）が並べ替えただけで出してしまうと、
  // 押した人にはまったく身に覚えのないまま相手側の並び順が消える。
  const resetWrap = document.getElementById('modal-order-reset');
  resetWrap.innerHTML = '';
  const savedOrder = OVERRIDES.order[group.name];
  const mineAsins = new Set(group.books.map(b => b.book.asin));
  if (EDITING && savedOrder && savedOrder.some(a => mineAsins.has(a))) {
    const reset = document.createElement('button');
    reset.className = 'btn order-reset';
    reset.textContent = '順番を自動に戻す';
    reset.addEventListener('click', () => {
      // 同じ名前の別グループぶんは残す。残りが無くなれば applyLocalOverride が自動判定へ戻す
      applyLocalOverride('order', group.name, savedOrder.filter(a => !mineAsins.has(a)));
      rebuild(true);
    });
    resetWrap.appendChild(reset);
  }
  const grid = document.getElementById('modal-grid');
  grid.innerHTML = '';
  for (const entry of group.books) grid.appendChild(bookCard(entry, { keepModal: true, group }));
  document.getElementById('modal').classList.add('open');
  document.body.classList.add('modal-open');
}
function closeModal() {
  CURRENT_GROUP_NAME = null;
  CURRENT_GROUP_KEY = null;
  CURRENT_GROUP_ASIN = null;
  document.getElementById('modal').classList.remove('open');
  document.body.classList.remove('modal-open');
}

function rebuild(keepModal) {
  // 並べ替えるたびにモーダルを作り直すので、スクロール位置を覚えておかないと毎回先頭へ飛ぶ
  const modalEl = document.getElementById('modal');
  const keptScroll = keepModal ? modalEl.scrollTop : 0;
  OVERRIDES = computeOverrides();
  GROUPS = groupBooks(ALL_ITEMS, OVERRIDES, SERIES_ORDER, new Set(allCategories().map(c => c.id)));
  // datalist（編集用のシリーズ名候補）はグループ構成が変わったときだけ作り直す
  const dl = document.getElementById('series-names');
  dl.innerHTML = '';
  for (const g of GROUPS) {
    const o = document.createElement('option');
    o.value = g.name;
    dl.appendChild(o);
  }
  render();
  if (keepModal && CURRENT_GROUP_NAME) {
    // 名前だけで探すと、同じ名前のグループがあるときに別のグループを開いてしまう。
    // key → 代表の本 → 名前 の順に、確かなものから探す。
    const still = GROUPS.find(g => g.key === CURRENT_GROUP_KEY)
      || GROUPS.find(g => g.books.some(b => b.book.asin === CURRENT_GROUP_ASIN))
      || GROUPS.find(g => g.name === CURRENT_GROUP_NAME);
    if (still) {
      openModal(still.key);
      modalEl.scrollTop = keptScroll;
    } else closeModal();
  } else {
    closeModal();
  }
}

/* ---------- イベント ---------- */
// 1文字ごとの全カード再構築は iPad の日本語入力でカクつくためデバウンスする
let searchTimer = null;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 180);
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('sort-select').addEventListener('change', function () {
  SORT_MODE = this.value;
  localStorage.setItem(SORT_KEY, SORT_MODE);
  render();
});

document.getElementById('edit-toggle').addEventListener('click', function () {
  EDITING = !EDITING;
  this.classList.toggle('active', EDITING);
  document.body.classList.toggle('editing', EDITING);
  rebuild(true);
});

document.getElementById('export-overrides').addEventListener('click', () => {
  // category/order は「現存するグループ名」のキーだけ出力する（改名で孤立したゴミを持ち越さない）
  const names = new Set(GROUPS.map(g => g.name));
  // categories のキーはカテゴリIDでグループ名ではないので、この掃除に巻き込むと消えてしまう。
  // series と同じくそのまま出す。
  const cleaned = { series: OVERRIDES.series, category: {}, order: {}, categories: OVERRIDES.categories };
  for (const sec of ['category', 'order']) {
    for (const [k, v] of Object.entries(OVERRIDES[sec])) {
      if (names.has(k)) cleaned[sec][k] = v;
    }
  }
  const content = '// bookshelf.html の編集モードで指定した手動修正（シリーズ名・カテゴリ・巻順）\n' +
    '// このファイルをリポジトリ直下に置くと他のデバイスにも反映されます\n' +
    'window.KINDLE_OVERRIDES = ' + JSON.stringify(cleaned, null, 2) + ';\n';
  const blob = new Blob([content], { type: 'application/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'overrides.js';
  a.click();
  URL.revokeObjectURL(a.href);
});

/* ---------- 起動 ---------- */
(async () => {
  // データのロード〜復号（サイトでは 1MB 超+PBKDF2）には数秒かかるため、まず状態を見せる
  document.getElementById('content').innerHTML = '<div id="empty-msg">読み込み中…</div>';
  let mode = 'plain';
  let triedEnc = false;
  try { await loadScript('./books.js'); } catch (e) { /* fallthrough */ }

  if (!window.KINDLE_BOOKS) {
    // GitHub Pages 用: 暗号化データがあれば復号する
    triedEnc = true;
    try { await loadScript('./data.enc.js'); } catch (e) { /* fallthrough */ }
    if (window.KINDLE_ENC) {
      try {
        const obj = await decryptFlow();
        window.KINDLE_BOOKS = obj.books;
        window.KINDLE_OVERRIDES = obj.overrides || {};
        window.KINDLE_SERIES_ORDER = obj.seriesOrder || {};
        mode = 'enc';
      } catch (e) { /* fallthrough */ }
    }
  }
  if (!window.KINDLE_BOOKS) {
    try { await loadScript('./books.sample.js'); mode = 'sample'; } catch (e) { /* noop */ }
  }

  if (mode === 'plain') {
    try { await loadScript('./overrides.js'); } catch (e) { /* optional */ }
    try { await loadScript('./series-order.js'); } catch (e) { /* optional */ }
  }

  const data = window.KINDLE_BOOKS;
  if (!data || !Array.isArray(data.items)) {
    // Android のファイルマネージャ等から開くと content:// URI になり、
    // 相対パスの books.js 等が権限外で一切読めない。原因を正しく案内する。
    const badProtocol = !/^(https?:|file:)$/.test(location.protocol);
    // https 配信で data.enc.js の取得に失敗した場合（モバイル回線の電波不良等）は
    // PC ローカル向けの books.js 案内ではなく再読み込みを案内する
    const siteLoadFailed = /^https?:$/.test(location.protocol) && triedEnc && !window.KINDLE_ENC;
    document.getElementById('content').innerHTML = badProtocol
      ? '<div id="empty-msg"><b>このページは ' + location.protocol + '// で開かれているため、データファイルを読み込めません。</b><br>' +
        'アプリ内ビューアやファイル共有からの直接オープンでは動作しません。<br>' +
        'ファイルを file:// で開けるブラウザで開くか、ローカルHTTPサーバー経由で開いてください。<br>' +
        '詳細は README.md の「別デバイスで使う」を参照。</div>'
      : siteLoadFailed
      ? '<div id="empty-msg">データの読み込みに失敗しました。<br>' +
        '通信状態を確認して、ページを再読み込みしてください。<br><br>' +
        '<button class="btn" onclick="location.reload()">再読み込み</button></div>'
      : '<div id="empty-msg">books.js が見つかりません。<br>' +
        'read.amazon.co.jp で取得スクリプト（fetch-library.js / ブックマークレット）を実行し、<br>' +
        'ダウンロードされた books.js をこの HTML と同じフォルダに置いてください。<br>' +
        '手順の詳細は README.md を参照。</div>';
    return;
  }

  ALL_ITEMS = data.items.filter(b => b && b.asin && b.title);

  FILE_OV = normalizeOverrides(window.KINDLE_OVERRIDES);
  SERIES_ORDER = (typeof window.KINDLE_SERIES_ORDER === 'object' && window.KINDLE_SERIES_ORDER) || {};
  LOCAL_OV = loadLocalOverrides();

  // overrides.js に反映済みの差分と、対象がファイルから消えた打ち消しマーカーを掃除
  let cleaned = false;
  for (const sec of OV_SECTIONS) {
    for (const [k, v] of Object.entries(LOCAL_OV[sec])) {
      if ((v === null && !(k in FILE_OV[sec])) || (v !== null && sameOverrideValue(FILE_OV[sec][k], v))) {
        delete LOCAL_OV[sec][k];
        cleaned = true;
      }
    }
  }
  if (cleaned) saveLocalOverrides(LOCAL_OV);

  // 「最近読んだ順」は閲覧ログ（このブラウザで開いた本）で機能するので、recencyRank を持たない
  // 蔵書データでも名前順へ落とさない。履歴が空のうちは全グループが同順位になり、50音順と同じ並びに縮退する。
  document.getElementById('sort-select').value = SORT_MODE;

  rebuild(false);

  if (mode === 'sample') {
    const note = document.createElement('div');
    note.id = 'edit-hint';
    note.style.display = 'block';
    note.textContent = 'サンプルデータを表示中です。README.md の手順で books.js を取得すると自分の蔵書が表示されます。';
    document.getElementById('content').prepend(note);
  }
})();
</script>
